<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca - Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="login-body" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh;">

<div style="width: 100%; padding: 20px;">
    <div style="background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); padding: 40px; max-width: 400px; margin: 0 auto;">
        <h1 style="color: #333; font-size: 24px; font-weight: 600; margin-bottom: 10px; text-align: center;">Biblioteca</h1>
        <p style="color: #666; font-size: 14px; text-align: center; margin-bottom: 30px;">Iniciar sesión</p>

        <form onsubmit="login(event)">
            <div class="mb-3">
                <input type="text" id="nombre" class="form-control" placeholder="Usuario" required>
            </div>

            <div class="mb-3">
                <input type="password" id="contrasena" class="form-control" placeholder="Contraseña" required>
            </div>

            <div id="mensaje" class="alert alert-danger d-none"></div>

            <button type="submit" class="btn btn-primary w-100" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; font-weight: 600;">
                Entrar
            </button>
        </form>
    </div>
</div>

<script src="ingreso.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
