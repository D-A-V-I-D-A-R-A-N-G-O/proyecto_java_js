<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="bg-gradient">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-lg border-0 rounded-lg overflow-hidden">
                        <!-- Header -->
                        <div class="card-header bg-primary text-white py-5 text-center">
                            <i class="bi bi-book-half fs-1 d-block mb-2"></i>
                            <h2 class="mb-2">Biblioteca</h2>
                            <p class="mb-0 small">Sistema de Gestión de Préstamos</p>
                        </div>

                        <!-- Body -->
                        <div class="card-body p-5">
                            <form id="loginForm">
                                <div class="mb-4">
                                    <label for="nombre" class="form-label fw-600">Usuario</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-person"></i>
                                        </span>
                                        <input
                                            type="text"
                                            class="form-control border-start-0"
                                            id="nombre"
                                            name="nombre"
                                            placeholder="Ingresa tu usuario"
                                            required
                                        >
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="contrasena" class="form-label fw-600">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="bi bi-lock"></i>
                                        </span>
                                        <input
                                            type="password"
                                            class="form-control border-start-0"
                                            id="contrasena"
                                            name="contrasena"
                                            placeholder="Ingresa tu contraseña"
                                            required
                                        >
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>
                                    Iniciar Sesión
                                </button>
                            </form>

                            <div id="alertContainer" class="mt-4"></div>
                        </div>

                        <!-- Footer -->
                        <div class="card-footer bg-light py-3 text-center">
                            <small class="text-muted">
                                <i class="bi bi-info-circle me-1"></i>
                                ¿Problemas? Contacta al administrador
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
