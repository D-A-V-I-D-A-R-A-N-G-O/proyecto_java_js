    <div class="collapse navbar-collapse" id="navbarText">

<div class="container mt-5">

    <h1 class="mb-4">
        Administración de Usuarios
    </h1>

    <div class="card p-4 mb-5">

        <input type="hidden" id="idUsuario">

        <div class="mb-3">
            <label>Nombre</label>

            <input type="text"
                   id="nombre"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Contraseña</label>

            <input type="password"
                   id="contrasena"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Celular</label>

            <input type="text"
                   id="celular"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Rol</label>

            <select id="rol"
                    class="form-control">

                <option value="ADMIN">
                    ADMIN
                </option>

                <option value="USER">
                    USER
                </option>

            </select>
        </div>

        <button class="btn btn-success"
                onclick="guardarUsuario()">

            Guardar Usuario
        </button>

    </div>

    <table class="table table-bordered">

        <thead>

        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Celular</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>

        </thead>

        <tbody id="tablaUsuarios">

        </tbody>

    </table>

</div>

<script src="../js/admin_usuarios.js"></script>

</body>
