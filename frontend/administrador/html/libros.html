<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Inicio Biblioteca</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse m-1" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <a class="nav-link" aria-current="page" href="libros.html">Libros</a>

          <a class="nav-link" href="prestamos.html">Prestamos</a>

</nav>
<div class="container mt-5">

    <h1 class="mb-4">Administración de Libros</h1>

    <div class="card p-4 mb-5">

        <input type="hidden" id="idLibro">

        <div class="mb-3">
            <label>Título</label>
            <input type="text" id="titulo" class="form-control">
        </div>

        <div class="mb-3">
            <label>Autor</label>
            <input type="text" id="autor" class="form-control">
        </div>

        <div class="mb-3">
            <label>Sinopsis</label>
            <textarea id="sinopsis" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Disponible</label>
            <select id="estado" class="form-control">
                <option value="true">Sí</option>
                <option value="false">No</option>
            </select>
        </div>

        <button class="btn btn-success" onclick="guardarLibro()">
            Guardar Libro
        </button>

    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaLibros">

        </tbody>
    </table>

</div>

<script src="../js/admin_libros.js"></script>

</body>
<script src="../js/verificacion.js"></script>
