<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-book-half me-2"></i>Biblioteca
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-section="inicio">
                            <i class="bi bi-house me-1"></i>Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-section="libros">
                            <i class="bi bi-book me-1"></i>Libros
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-section="prestamos">
                            <i class="bi bi-box-seam me-1"></i>Mis Préstamos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-section="resenas">
                            <i class="bi bi-star me-1"></i>Mis Reseñas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="logoutBtn">
                            <i class="bi bi-box-arrow-right me-1"></i>Salir
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid py-4">
            <!-- Inicio/Dashboard -->
            <section id="inicio" class="section active">
                <div class="row mb-4">
                    <div class="col-12">
                        <h1 class="h3 mb-3">
                            <i class="bi bi-speedometer2 me-2"></i>Bienvenido
                        </h1>
                    </div>
                </div>

                <div class="row g-3">
                    <!-- Total Libros -->
                    <div class="col-md-6 col-lg-4">
                        <div class="card stat-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <p class="card-text text-muted small">Total de Libros</p>
                                        <p class="h2 fw-bold text-primary mb-0" id="totalLibros">-</p>
                                    </div>
                                    <div class="stat-icon bg-primary bg-opacity-10">
                                        <i class="bi bi-book text-primary fs-3"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Préstamos Activos -->
                    <div class="col-md-6 col-lg-4">
                        <div class="card stat-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <p class="card-text text-muted small">Préstamos Activos</p>
                                        <p class="h2 fw-bold text-success mb-0" id="prestamosActivos">-</p>
                                    </div>
                                    <div class="stat-icon bg-success bg-opacity-10">
                                        <i class="bi bi-box-seam text-success fs-3"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Mis Reseñas -->
                    <div class="col-md-6 col-lg-4">
                        <div class="card stat-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <p class="card-text text-muted small">Mis Reseñas</p>
                                        <p class="h2 fw-bold text-warning mb-0" id="misResenas">-</p>
                                    </div>
                                    <div class="stat-icon bg-warning bg-opacity-10">
                                        <i class="bi bi-star text-warning fs-3"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Libros -->
            <section id="libros" class="section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 mb-0">
                        <i class="bi bi-book me-2"></i>Catálogo de Libros
                    </h1>
                </div>

                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-search"></i>
                            </span>
                            <input
                                type="text"
                                class="form-control border-start-0"
                                id="searchLibros"
                                placeholder="Buscar por título o autor..."
                            >
                        </div>
                    </div>
                </div>

                <div class="row g-3" id="librosGrid">
                    <!-- Libros cargados aquí -->
                </div>
            </section>

            <!-- Préstamos -->
            <section id="prestamos" class="section">
                <h1 class="h3 mb-4">
                    <i class="bi bi-box-seam me-2"></i>Mis Préstamos
                </h1>

                <div class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th><i class="bi bi-book me-2"></i>Libro</th>
                                    <th><i class="bi bi-person me-2"></i>Autor</th>
                                    <th><i class="bi bi-calendar me-2"></i>Fecha Préstamo</th>
                                    <th><i class="bi bi-calendar-check me-2"></i>Fecha Devolución</th>
                                    <th><i class="bi bi-info-circle me-2"></i>Estado</th>
                                </tr>
                            </thead>
                            <tbody id="prestamosTableBody">
                                <tr>
                                    <td colspan="5" class="text-center py-4">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Reseñas -->
            <section id="resenas" class="section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 mb-0">
                        <i class="bi bi-star me-2"></i>Mis Reseñas
                    </h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#resenaModal">
                        <i class="bi bi-plus-circle me-2"></i>Nueva Reseña
                    </button>
                </div>

                <div class="row g-3" id="resenasContainer">
                    <!-- Reseñas cargadas aquí -->
                </div>
            </section>
        </div>
    </main>

    <!-- Modal Nueva Reseña -->
    <div class="modal fade" id="resenaModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title">
                        <i class="bi bi-star me-2"></i>Nueva Reseña
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="resenaForm">
                        <div class="mb-3">
                            <label for="resenaLibro" class="form-label fw-600">Libro</label>
                            <select id="resenaLibro" class="form-select" required>
                                <option value="">Selecciona un libro</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="resenaPuntuacion" class="form-label fw-600">Puntuación</label>
                            <select id="resenaPuntuacion" class="form-select" required>
                                <option value="">Selecciona una puntuación</option>
                                <option value="1">⭐ 1 - Muy malo</option>
                                <option value="2">⭐⭐ 2 - Malo</option>
                                <option value="3">⭐⭐⭐ 3 - Regular</option>
                                <option value="4">⭐⭐⭐⭐ 4 - Bueno</option>
                                <option value="5">⭐⭐⭐⭐⭐ 5 - Excelente</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="resenaComentario" class="form-label fw-600">Comentario</label>
                            <textarea
                                id="resenaComentario"
                                class="form-control"
                                rows="4"
                                placeholder="Cuéntanos qué te pareció..."
                            ></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarResena()">Guardar Reseña</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Solicitar Préstamo -->
    <div class="modal fade" id="prestamoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header bg-success text-white border-0">
                    <h5 class="modal-title">
                        <i class="bi bi-box-seam me-2"></i>Solicitar Préstamo
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-0" id="modalLibroInfo"></p>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="confirmarPrestamo()">Confirmar Préstamo</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer" class="alert-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/usuario-dashboard.js"></script>
</body>
</html>
